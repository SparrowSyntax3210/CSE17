<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degree Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="Box">
    <h1 class="heading">Celsius to Fahrenheit Converter</h1>

    <input
        type="number"
        id="degree"
        placeholder="Enter Temperature in Celsius"
    >

    <button class="button" onclick="convert()">
        Convert
    </button>

    <h2 id="fahrenheit">Fahrenheit: 0 °F</h2>
</div>

<script src="./script.js"></script>

</body>
</html>
